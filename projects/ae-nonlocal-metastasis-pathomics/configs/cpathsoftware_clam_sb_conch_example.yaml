General:
  MODEL_NAME: CLAM_SB_MIL
  seed: 2024
  task_type: classification
  num_classes: 2
  num_epochs: 100
  best_model_metric: macro_auc
  earlystop:
    use: false
Dataset:
  DATASET_NAME: AE_nonlocal_metastasis_CLAM_SB_MIL_CONCH
  dataset_root_dir: ${DATASET_ROOT_DIR}
  dataset_csv_path: null
  tabular_csv_path: null
  balanced_sampler:
    use: false
    replacement: true
Logs:
  log_root_dir: ${LOG_ROOT_DIR}
Model:
  in_dim: 512
  dropout: 0.1
  act: relu
  k_sample: 8
  size_arg: small
  instance_loss_fn: ce
  subtyping: false
  instance_eval: true
  gate: true
  bag_weight: 0.7
  optimizer:
    which: adam
    adam_config:
      lr: 0.0002
      weight_decay: 1.0e-05
  criterion: ce
  scheduler:
    warmup: 2
    which: step
    step_config:
      step_size: 3
      gamma: 0.9
